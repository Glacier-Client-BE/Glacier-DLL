name: Build Glacier Client

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # Allows manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Visual Studio / MSVC (already on windows-latest) ──────────────────
      - name: Add MSVC to PATH
        uses: microsoft/setup-msbuild@v2

      # ── 3. CMake (already on windows-latest, but pin a known version) ────────
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28'

      # ── 4. Cache the FetchContent downloads so re-runs are fast ──────────────
      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: |
            build/_deps
            fonts
          key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-

      # ── 5. Configure ─────────────────────────────────────────────────────────
      - name: Configure (x64 Release)
        run: |
          cmake -B build -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      # ── 6. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: |
          cmake --build build --config Release --parallel

      # ── 7. Collect artifacts ─────────────────────────────────────────────────
      - name: Collect output files
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "build\Release\glacier.dll"        -Destination dist\
          # Copy font if it was downloaded
          if (Test-Path "build\Release\fa-solid-900.ttf") {
            Copy-Item "build\Release\fa-solid-900.ttf" -Destination dist\
          }
          # Also copy from fonts/ if post-build step didn't run
          elseif (Test-Path "fonts\fa-solid-900.ttf") {
            Copy-Item "fonts\fa-solid-900.ttf"         -Destination dist\
          }
          Write-Host "--- dist contents ---"
          Get-ChildItem dist

      # ── 8. Upload artifact ────────────────────────────────────────────────────
      - name: Upload glacier.dll
        uses: actions/upload-artifact@v4
        with:
          name: GlacierClient-${{ github.sha }}
          path: dist/
          retention-days: 30

      # ── 9. (Optional) Create a GitHub Release on tagged pushes ───────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/glacier.dll
            dist/fa-solid-900.ttf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

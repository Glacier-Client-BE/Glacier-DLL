name: Build and Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine Next Version
      id: versioning
      shell: pwsh
      run: |
        # Version format: Major.Edition.Hotfix (e.g. 1.0.0, 1.1.0, 1.1.1)
        # "hotfix:" in commit message → bump hotfix (1.0.0 → 1.0.1)
        # "update:" in commit message → bump edition, reset hotfix (1.0.0 → 1.1.0)
        $tags = @(git tag -l "v*" | Sort-Object { [version]($_ -replace 'v','') })
        if ($tags.Count -eq 0) {
            $next = "v1.0.0"
        } else {
            $latest = ($tags[-1] -replace 'v','')
            $v = [version]$latest
            $msg = git log -1 --pretty=%s
            if ($msg -match '^hotfix:') {
                $next = "v$($v.Major).$($v.Minor).$($v.Build + 1)"
            } elseif ($msg -match '^update:') {
                $next = "v$($v.Major).$($v.Minor + 1).0"
            } else {
                Write-Host "Commit message does not start with 'hotfix:' or 'update:' — skipping release."
                echo "SKIP=true" >> $env:GITHUB_OUTPUT
                return
            }
        }
        echo "NEXT_TAG=$next" >> $env:GITHUB_OUTPUT
        echo "NEXT_VERSION=$($next -replace 'v','')" >> $env:GITHUB_OUTPUT
        Write-Host "Next version: $next"

    # ── Build Tools ──────────────────────────────────────────────────────────
    - name: Add MSVC to PATH
      if: steps.versioning.outputs.SKIP != 'true'
      uses: microsoft/setup-msbuild@v2

    - name: Setup CMake
      if: steps.versioning.outputs.SKIP != 'true'
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '3.28'

    # ── Cache ────────────────────────────────────────────────────────────────
    - name: Cache CMake dependencies
      if: steps.versioning.outputs.SKIP != 'true'
      uses: actions/cache@v4
      with:
        path: build/_deps
        key: cmake-deps-${{ hashFiles('CMakeLists.txt') }}
        restore-keys: cmake-deps-

    # ── Configure ────────────────────────────────────────────────────────────
    - name: Configure (x64 Release)
      if: steps.versioning.outputs.SKIP != 'true'
      run: |
        cmake -B build -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DGLACIER_VERSION=${{ steps.versioning.outputs.NEXT_VERSION }}

    # ── Build ────────────────────────────────────────────────────────────────
    - name: Build
      if: steps.versioning.outputs.SKIP != 'true'
      run: |
        cmake --build build --config Release --parallel

    # ── Collect artifacts ────────────────────────────────────────────────────
    - name: Collect output files
      if: steps.versioning.outputs.SKIP != 'true'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path dist
        Copy-Item "build\Release\glacier.dll" -Destination dist\
        Write-Host "--- dist contents ---"
        Get-ChildItem dist

    # ── Tag ──────────────────────────────────────────────────────────────────
    - name: Create and Push Tag
      if: steps.versioning.outputs.SKIP != 'true'
      shell: pwsh
      run: |
        $tag = "${{ steps.versioning.outputs.NEXT_TAG }}"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag $tag
        git push origin $tag

    # ── Release ──────────────────────────────────────────────────────────────
    - name: Release
      if: steps.versioning.outputs.SKIP != 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.versioning.outputs.NEXT_TAG }}
        generate_release_notes: true
        files: ${{ github.workspace }}/dist/glacier.dll
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ── Trigger Website ──────────────────────────────────────────────────────
    - name: Trigger Website Repo
      if: steps.versioning.outputs.SKIP != 'true'
      run: |
        gh api repos/Glacier-Client-BE/Glacier-Website/dispatches -f event_type=dll-release
      env:
        GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
